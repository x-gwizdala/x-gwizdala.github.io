<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moody Octopus — Bézier Curves</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0e17;
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e0e6f0;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  .ui {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    align-items: center;
    background: rgba(10, 14, 23, 0.9);
    backdrop-filter: blur(10px);
    padding: 14px 26px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.06);
    user-select: none;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ui label {
    font-size: 13px;
    color: #8aa4c8;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ui input[type="range"] { width: 100px; accent-color: #9aa2ad; }
  .ui span.val {
    font-variant-numeric: tabular-nums;
    min-width: 28px; text-align: right;
    color: #fff; font-weight: 600; font-size: 13px;
  }
  .mood-badge {
    position: absolute;
    top: 20px;
    right: 24px;
    background: rgba(10,14,23,0.85);
    backdrop-filter: blur(8px);
    padding: 10px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
    color: #8aa4c8;
    transition: color 0.8s ease, border-color 0.8s ease;
  }
  .mood-badge .mood-name {
    color: #fff;
    font-weight: 600;
    margin-left: 6px;
    transition: color 1.2s ease;
  }
  .hint {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    text-align: center;
  }
  .mood-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #c8d4e4;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .mood-btn:hover { background: rgba(255,255,255,0.12); }
  .mood-btn:active { transform: scale(0.96); }
</style>
<base target="_blank">
</head>
<body>

<div class="hint">
  Click to attract &nbsp;•&nbsp; Move your mouse to change the current &nbsp;•&nbsp; Mood changes on its own
</div>

<div class="mood-badge">
  Mood:<span class="mood-name" id="moodName">Calm</span>
</div>

<canvas id="octoCanvas"></canvas>

<div class="ui">
  <label>Speed<input type="range" id="speedRange" min="0.2" max="2.5" step="0.1" value="0.6"><span class="val" id="speedVal">0.6</span></label>
  <label>Tentacles<input type="range" id="tentRange" min="4" max="12" step="1" value="8"><span class="val" id="tentVal">8</span></label>
  <button class="mood-btn" id="forceMoodBtn">Force mood change</button>
</div>

<script>
(function() {
  const canvas = document.getElementById('octoCanvas');
  const ctx = canvas.getContext('2d');
  const speedInput = document.getElementById('speedRange');
  const tentInput = document.getElementById('tentRange');
  const speedVal = document.getElementById('speedVal');
  const tentVal = document.getElementById('tentVal');
  const moodNameEl = document.getElementById('moodName');
  const forceBtn = document.getElementById('forceMoodBtn');

  let W, H;
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * window.devicePixelRatio;
    canvas.height = H * window.devicePixelRatio;
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- MOOD SYSTEM ----
  const moods = {
    calm:       { name: 'Calm',       h: 200, s: 40,  l: 55,  bg: [10,14,23],     amp: 1.0, freq: 1.0, jitter: 0.0 },
    melancholy: { name: 'Melancholy', h: 220, s: 25,  l: 45,  bg: [8,10,18],      amp: 0.6, freq: 0.7, jitter: 0.1 },
    energy:     { name: 'Energy',     h: 15,  s: 85,  l: 60,  bg: [18,8,6],       amp: 1.8, freq: 1.6, jitter: 0.4 },
    mystery:    { name: 'Mystery',    h: 270, s: 55,  l: 50,  bg: [12,6,18],      amp: 1.2, freq: 0.9, jitter: 0.2 },
    euphoria:   { name: 'Euphoria',   h: 45,  s: 90,  l: 65,  bg: [16,14,4],      amp: 2.0, freq: 1.8, jitter: 0.5 },
    depth:      { name: 'Depth',      h: 170, s: 60,  l: 45,  bg: [4,14,12],      amp: 0.8, freq: 0.8, jitter: 0.15 },
    unease:     { name: 'Unease',     h: 340, s: 70,  l: 55,  bg: [16,4,8],       amp: 1.5, freq: 2.2, jitter: 0.6 },
  };
  const moodKeys = Object.keys(moods);

  let currentMoodKey = 'calm';
  let targetMoodKey = 'calm';
  let moodTransition = 0;
  let moodTimer = 0;
  let nextMoodChange = 8 + Math.random() * 10;
  let moodShiftSpeed = 0.3;

  let curH = moods.calm.h, curS = moods.calm.s, curL = moods.calm.l;
  let curBg = [...moods.calm.bg];
  let curAmp = moods.calm.amp, curFreq = moods.calm.freq, curJitter = moods.calm.jitter;

  function pickRandomMood() {
    let keys = moodKeys.filter(k => k !== targetMoodKey);
    return keys[Math.floor(Math.random() * keys.length)];
  }

  function hsl(h,s,l) { return `hsl(${h},${s}%,${l}%)`; }
  function hsla(h,s,l,a) { return `hsla(${h},${s}%,${l}%,${a})`; }

  function updateMood(dt) {
    moodTimer += dt;

    if (moodTimer > nextMoodChange) {
      moodTimer = 0;
      nextMoodChange = 5 + Math.random() * 15;
      if (Math.random() < 0.3) {
        currentMoodKey = targetMoodKey;
        targetMoodKey = pickRandomMood();
        moodTransition = 0;
        moodShiftSpeed = 2.0;
      } else {
        currentMoodKey = targetMoodKey;
        targetMoodKey = pickRandomMood();
        moodTransition = 0;
        moodShiftSpeed = 0.15 + Math.random() * 0.4;
      }
      moodNameEl.textContent = moods[targetMoodKey].name;
      moodNameEl.style.color = hsl(moods[targetMoodKey].h, moods[targetMoodKey].s, moods[targetMoodKey].l);
    }

    const c = moods[currentMoodKey];
    const t = moods[targetMoodKey];
    moodTransition = Math.min(1, moodTransition + dt * moodShiftSpeed);

    let ease = moodTransition < 0.5 ? 2*moodTransition*moodTransition : 1 - Math.pow(-2*moodTransition+2,2)/2;
    ease += (Math.random() - 0.5) * curJitter * 0.1;
    ease = Math.max(0, Math.min(1, ease));

    curH = c.h + (t.h - c.h) * ease;
    curS = c.s + (t.s - c.s) * ease;
    curL = c.l + (t.l - c.l) * ease;
    curAmp = c.amp + (t.amp - c.amp) * ease;
    curFreq = c.freq + (t.freq - c.freq) * ease;
    curJitter = c.jitter + (t.jitter - c.jitter) * ease;
    for (let i = 0; i < 3; i++) {
      curBg[i] = c.bg[i] + (t.bg[i] - c.bg[i]) * ease;
    }
  }

  // ---- OCTOPUS ----
  let mouseX = W/2, mouseY = H/2;
  let targetX = W/2, targetY = H/2;
  let headX = W/2, headY = H/2;
  let time = 0;
  let speed = 0.6;
  let numTentacles = 8;
  let tentacles = [];

  function initTentacles() {
    tentacles = [];
    for (let i = 0; i < numTentacles; i++) {
      const angle = (Math.PI * 2 * i) / numTentacles;
      tentacles.push({
        angle: angle,
        length: 100 + Math.random() * 70,
        phase: Math.random() * Math.PI * 2,
        freq: 0.5 + Math.random() * 0.8,
        amp: 25 + Math.random() * 35,
        segments: 4 + Math.floor(Math.random() * 3)
      });
    }
  }
  initTentacles();

  function lerp(a,b,t) { return a + (b-a)*t; }

  function drawBezierTentacle(headX, headY, tentacle) {
    const baseAngle = tentacle.angle + Math.sin(time * tentacle.freq * 0.3 * curFreq + tentacle.phase) * 0.15;
    const segLen = tentacle.length / tentacle.segments;
    let points = [];
    let px = headX + Math.cos(baseAngle) * 22;
    let py = headY + Math.sin(baseAngle) * 22;
    points.push({x: px, y: py});

    for (let s = 1; s <= tentacle.segments; s++) {
      const wave = Math.sin(time * tentacle.freq * curFreq + tentacle.phase + s * 0.8) * tentacle.amp * curAmp * (s / tentacle.segments);
      const perp = baseAngle + Math.PI / 2;
      const jx = (Math.random() - 0.5) * curJitter * 8 * (s / tentacle.segments);
      const jy = (Math.random() - 0.5) * curJitter * 8 * (s / tentacle.segments);
      px += Math.cos(baseAngle) * segLen + Math.cos(perp) * wave * 0.3 + jx;
      py += Math.sin(baseAngle) * segLen + Math.sin(perp) * wave * 0.3 + jy;
      points.push({x: px, y: py});
    }

    const last = points[points.length - 1];

    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length - 1; i++) {
      const cp2x = (points[i].x + points[i+1].x) / 2;
      const cp2y = (points[i].y + points[i+1].y) / 2;
      ctx.quadraticCurveTo(points[i].x, points[i].y, (cp2x + points[i].x)/2, (cp2y + points[i].y)/2);
    }
    if (points.length > 2) {
      const prev = points[points.length-2];
      ctx.quadraticCurveTo(prev.x, prev.y, last.x, last.y);
    } else if (points.length === 2) {
      ctx.lineTo(points[1].x, points[1].y);
    }

    const grad = ctx.createLinearGradient(headX, headY, last.x, last.y);
    grad.addColorStop(0, hsl(curH, curS, curL));
    grad.addColorStop(1, hsla(curH, curS * 0.6, curL, 0.15));
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3 + curJitter * 3;
    ctx.lineCap = 'round';
    ctx.stroke();

    for (let i = 1; i < points.length; i++) {
      const r = (2.2 + Math.random() * curJitter) * (1 - i / points.length);
      ctx.beginPath();
      ctx.arc(points[i].x, points[i].y, r, 0, Math.PI * 2);
      ctx.fillStyle = hsla(curH, curS * 0.5, curL + 15, 0.35 + curJitter * 0.3);
      ctx.fill();
    }
  }

  function drawHead(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 45 + curJitter * 15, 0, Math.PI * 2);
    const glow = ctx.createRadialGradient(x, y, 8, x, y, 50 + curJitter * 15);
    glow.addColorStop(0, hsla(curH, curS, curL, 0.2 + curJitter * 0.1));
    glow.addColorStop(1, hsla(curH, curS, curL, 0));
    ctx.fillStyle = glow;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, 24, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${curBg[0]+8},${curBg[1]+12},${curBg[2]+16})`;
    ctx.fill();
    ctx.strokeStyle = hsl(curH, curS, curL);
    ctx.lineWidth = 2;
    ctx.stroke();

    const eyeOffset = 9;
    const eyeY = y - 4;
    ctx.beginPath();
    ctx.arc(x - eyeOffset, eyeY, 6, 0, Math.PI * 2);
    ctx.arc(x + eyeOffset, eyeY, 6, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${curBg[0]},${curBg[1]},${curBg[2]})`;
    ctx.fill();
    ctx.strokeStyle = hsl(curH, curS * 0.7, curL + 20);
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const pupilX = (mouseX - x) * 0.025;
    const pupilY = (mouseY - y) * 0.025;
    ctx.beginPath();
    ctx.arc(x - eyeOffset + pupilX, eyeY + pupilY, 2.5, 0, Math.PI * 2);
    ctx.arc(x + eyeOffset + pupilX, eyeY + pupilY, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = hsl(curH, curS, curL + 30);
    ctx.fill();
  }

  function drawParticles() {
    const count = 35;
    for (let i = 0; i < count; i++) {
      const px = ((i * 137.5 + time * 8) % W);
      const py = ((i * 89.3 + time * 5) % H);
      const r = 1 + (i % 4) * 0.6;
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fillStyle = hsla(curH, curS * 0.4, curL + 10, 0.2 + Math.sin(time * 0.5 + i) * 0.1);
      ctx.fill();
    }
  }

  function drawBubbles() {
    const count = 14;
    for (let i = 0; i < count; i++) {
      const bx = ((i * 213.7 + time * 3) % (W + 100)) - 50;
      const by = H - ((i * 67.1 + time * 20 * speed * curFreq) % (H + 100)) + 50;
      const br = 3 + (i % 5);
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.strokeStyle = hsla(curH, curS * 0.3, curL, 0.12 + curJitter * 0.08);
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  function drawBackground() {
    const bgStr = `rgb(${Math.round(curBg[0])},${Math.round(curBg[1])},${Math.round(curBg[2])})`;
    ctx.fillStyle = bgStr;
    ctx.fillRect(0, 0, W, H);
  }

  let lastTime = performance.now();

  function animate(now) {
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    time += 0.016 * speed * curFreq;

    updateMood(dt);
    drawBackground();
    drawParticles();
    drawBubbles();

    const followSpeed = 0.015 * speed * (2 - curFreq * 0.5);
    headX = lerp(headX, targetX, followSpeed);
    headY = lerp(headY, targetY, followSpeed);
    headX += Math.sin(time * 0.4) * 0.4 * curAmp;
    headY += Math.cos(time * 0.3) * 0.4 * curAmp;

    for (const t of tentacles) {
      drawBezierTentacle(headX, headY, t);
    }
    drawHead(headX, headY);

    requestAnimationFrame(animate);
  }

  canvas.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
  });
  canvas.addEventListener('click', e => {
    targetX = e.clientX; targetY = e.clientY;
  });
  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    targetX = t.clientX; targetY = t.clientY;
  }, {passive: true});

  speedInput.addEventListener('input', e => {
    speed = parseFloat(e.target.value);
    speedVal.textContent = speed.toFixed(1);
  });
  tentInput.addEventListener('input', e => {
    numTentacles = parseInt(e.target.value);
    tentVal.textContent = numTentacles;
    initTentacles();
  });
  forceBtn.addEventListener('click', () => {
    moodTimer = 999;
  });

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
